name: Build Windows Electron App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'electron/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/windows-electron-build.yml'

jobs:
  build-windows:
    name: Windows portable exe
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify CCR schedule logic
        run: npm run verify:sequence

      - name: Run unit tests
        run: npm test

      - name: Build Windows portable app
        run: npm run electron:dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCR-Calendar-Windows-Portable
          path: release/*.exe
          if-no-files-found: error
